name: Publish
on:
  release:
    types: [released, prereleased]
permissions:
  contents: write
  packages: write
jobs:
  build-native:
    name: Build JVM native – ${{ matrix.variant }} (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            lib: libstockfishjni.so
            module: stockfish-multiplatform
            variant: full
          - os: macos-latest
            lib: libstockfishjni.dylib
            module: stockfish-multiplatform
            variant: full
          - os: windows-latest
            lib: stockfishjni.dll
            module: stockfish-multiplatform
            variant: full
          - os: ubuntu-latest
            lib: libstockfishjni.so
            module: stockfish-multiplatform-lite
            variant: lite
          - os: macos-latest
            lib: libstockfishjni.dylib
            module: stockfish-multiplatform-lite
            variant: lite
          - os: windows-latest
            lib: stockfishjni.dll
            module: stockfish-multiplatform-lite
            variant: lite
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Compile JVM native library
        run: ./gradlew :${{ matrix.module }}:compileJvmNative --no-configuration-cache
      - name: Upload native library
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-${{ matrix.variant }}-${{ matrix.os }}
          path: ${{ matrix.module }}/src/jvmMain/resources/stockfish/${{ matrix.lib }}
          retention-days: 1

  publish:
    name: Release build and publish
    needs: build-native
    # Must run on macOS so Kotlin/Native iOS targets (iosArm64, iosSimulatorArm64, iosX64)
    # can be compiled and published. Publishing from Linux silently omits the iOS klibs.
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Verify release tag matches library version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          VERSION=$(grep '^library\.version=' gradle.properties | cut -d= -f2)
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Release tag '$TAG' does not match library.version '$VERSION'."
            echo "The published artifacts use library.version, NOT the tag. Set"
            echo "library.version in gradle.properties to match the release tag before releasing."
            exit 1
          fi
          echo "Release tag matches library.version: $VERSION"
      - name: Download full module native libraries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: stockfish-multiplatform/src/jvmMain/resources/stockfish/
          pattern: native-full-*
          merge-multiple: true
      - name: Download lite module native libraries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: stockfish-multiplatform-lite/src/jvmMain/resources/stockfish/
          pattern: native-lite-*
          merge-multiple: true
      - name: Verify native libraries
        # Fail loudly if any platform's JVM native is missing, rather than silently publishing a jar
        # that only works on some OSes. The set must match the build-native matrix.
        run: |
          for module in stockfish-multiplatform stockfish-multiplatform-lite; do
            dir="$module/src/jvmMain/resources/stockfish"
            echo "=== $module ==="
            ls -la "$dir" || true
            for lib in libstockfishjni.so libstockfishjni.dylib stockfishjni.dll; do
              if [ ! -s "$dir/$lib" ]; then
                echo "::error::Missing or empty native library: $dir/$lib"
                exit 1
              fi
            done
          done
      # Maven Central is published first because it is the canonical artifact and it rejects
      # duplicate versions: if it fails, the version is not bumped and the release can be re-run
      # cleanly. GitHub Packages follows and is allowed to fail without blocking the version bump.
      - name: Publish to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
      - name: Publish to GitHub Packages
        continue-on-error: true
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository --no-configuration-cache
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
      - name: Bump version on default branch
        # The release runs from a detached HEAD at the tag. Bump on the live branch tip so the push
        # is always fast-forward, even if the default branch advanced since the tag was cut.
        run: |
          BRANCH="${{ github.event.repository.default_branch }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH"
          git switch -C "$BRANCH" "origin/$BRANCH"
          CURRENT=$(grep '^library\.version=' gradle.properties | cut -d= -f2)
          # Increment last numeric segment: 0.1.0-alpha.11 -> 0.1.0-alpha.12, 0.1.0 -> 0.1.1.
          # PREFIX is derived from LAST (not from a glob suffix-strip) because `%[0-9]*`
          # is shortest-match and only strips a single trailing digit, which turned
          # alpha.11 into alpha.112 instead of alpha.12.
          LAST="${CURRENT##*[!0-9]}"
          PREFIX="${CURRENT%$LAST}"
          NEXT="${PREFIX}$(( LAST + 1 ))"
          echo "Bumping version: $CURRENT -> $NEXT"
          # -i.bak works on both GNU sed (Linux) and BSD sed (macOS); remove the backup.
          sed -i.bak "s/^library\.version=.*/library.version=$NEXT/" gradle.properties
          rm gradle.properties.bak
          git add gradle.properties
          git commit -m "chore: bump version to $NEXT"
          git push origin "$BRANCH"
