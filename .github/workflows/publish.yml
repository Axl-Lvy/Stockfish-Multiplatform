name: Publish
on:
  release:
    types: [released, prereleased]
permissions:
  contents: write
  packages: write
jobs:
  build-native:
    name: Build JVM native – ${{ matrix.variant }} (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            lib: libstockfishjni.so
            module: stockfish-multiplatform
            variant: full
          - os: macos-latest
            lib: libstockfishjni.dylib
            module: stockfish-multiplatform
            variant: full
          - os: windows-latest
            lib: stockfishjni.dll
            module: stockfish-multiplatform
            variant: full
          - os: ubuntu-latest
            lib: libstockfishjni.so
            module: stockfish-multiplatform-lite
            variant: lite
          - os: macos-latest
            lib: libstockfishjni.dylib
            module: stockfish-multiplatform-lite
            variant: lite
          - os: windows-latest
            lib: stockfishjni.dll
            module: stockfish-multiplatform-lite
            variant: lite
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Compile JVM native library
        run: ./gradlew :${{ matrix.module }}:compileJvmNative --no-configuration-cache
      - name: Upload native library
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-${{ matrix.variant }}-${{ matrix.os }}
          path: ${{ matrix.module }}/src/jvmMain/resources/stockfish/${{ matrix.lib }}
          retention-days: 1

  publish:
    name: Release build and publish
    needs: build-native
    # Must run on macOS so Kotlin/Native iOS targets (iosArm64, iosSimulatorArm64, iosX64)
    # can be compiled and published. Publishing from Linux silently omits the iOS klibs.
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Download full module native libraries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: stockfish-multiplatform/src/jvmMain/resources/stockfish/
          pattern: native-full-*
          merge-multiple: true
      - name: Download lite module native libraries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: stockfish-multiplatform-lite/src/jvmMain/resources/stockfish/
          pattern: native-lite-*
          merge-multiple: true
      - name: Verify native libraries
        run: |
          echo "=== Full module ==="
          ls -la stockfish-multiplatform/src/jvmMain/resources/stockfish/
          echo "=== Lite module ==="
          ls -la stockfish-multiplatform-lite/src/jvmMain/resources/stockfish/
      - name: Publish to GitHub Packages
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository --no-configuration-cache
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
      - name: Publish to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
      - name: Bump version
        run: |
          CURRENT=$(grep '^library\.version=' gradle.properties | cut -d= -f2)
          # Increment last numeric segment: 0.1.0-alpha.11 -> 0.1.0-alpha.12, 0.1.0 -> 0.1.1.
          # PREFIX is derived from LAST (not from a glob suffix-strip) because `%[0-9]*`
          # is shortest-match and only strips a single trailing digit, which turned
          # alpha.11 into alpha.112 instead of alpha.12.
          LAST="${CURRENT##*[!0-9]}"
          PREFIX="${CURRENT%$LAST}"
          NEXT="${PREFIX}$(( LAST + 1 ))"
          echo "Bumping version: $CURRENT -> $NEXT"
          # -i.bak works on both GNU sed (Linux) and BSD sed (macOS); remove the backup.
          sed -i.bak "s/^library\.version=.*/library.version=$NEXT/" gradle.properties
          rm gradle.properties.bak
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore: bump version to $(grep '^library\.version=' gradle.properties | cut -d= -f2)"
          git push origin HEAD:${{ github.event.repository.default_branch }}
